<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登录 — qB - 达量限速管理</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3v10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M8.5 6.5L12 3l3.5 3.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M5 14h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M7 17h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M9 20h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="login-titles">
                    <h1>qB 达量限速管理<span class="login-app-id">qb-up-limit</span></h1>
                    <p class="login-subtitle">流量监控 · 周期达量 · 自动限速<a href="https://github.com/luowenfu/qb-up-limit" class="login-github-link" target="_blank" rel="noopener noreferrer" title="GitHub 仓库" aria-label="GitHub 仓库"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg></a></p>
                </div>
            </div>
            <form id="loginForm" class="login-form">
                <label>账号
                    <input type="text" id="loginUsername" value="admin" autocomplete="username" required />
                </label>
                <label>密码
                    <input type="password" id="loginPassword" autocomplete="current-password" required />
                </label>
                <label class="checkbox-label login-remember">
                    <input type="checkbox" id="loginRemember" />
                    保持登录（30 天）
                </label>
                <button type="submit" class="btn-primary btn-block" id="loginBtn">登录</button>
                <p id="loginError" class="login-error" style="display:none"></p>
            </form>
            <p class="login-version" id="loginVersion"></p>
        </div>
    </div>
    <script src="/static/js/version.js"></script>
    <script>
        document.getElementById('loginVersion').textContent = APP_VERSION;
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value.trim(),
                        password: document.getElementById('loginPassword').value,
                        remember: document.getElementById('loginRemember').checked
                    })
                });
                const data = await res.json();
                if (data.success) {
                    sessionStorage.setItem('qb-up-limit-current-tab', 'devices');
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.error || '登录失败';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = '网络错误';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
